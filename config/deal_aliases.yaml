# Deal aliases
# Purpose: map canonical deal/opportunity names to aliases found in deals.csv,
# Obsidian notes, comments, and status exports.
#
# Important:
# - This is only for real opportunities / SOWs / presales deals.
# - Do not add signed delivery clients here unless they need a deal-specific alias.
# - Because deals.csv does not include a clean opportunity-name column, these
#   canonical names use "<customer> - <NetSuite Opportunity ID>".
# - For customers with multiple opportunities, aliases are intentionally
#   deal-specific to avoid mapping every "SEI" mention to the wrong opportunity.

